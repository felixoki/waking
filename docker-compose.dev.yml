services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: waken
      POSTGRES_USER: waken
      POSTGRES_PASSWORD: waken
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

volumes:
  pg_data_dev:
  redis_data_dev:
